name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Generate release notes from conventional commits ──────────────
      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          CURRENT_TAG=${GITHUB_REF#refs/tags/}

          {
            echo "NOTES<<EOF"

            if [ -z "$PREV_TAG" ]; then
              RANGE="HEAD"
              echo "## 🎉 Initial Release"
              echo ""
            else
              RANGE="${PREV_TAG}..HEAD"
              echo "## What's Changed"
              echo ""
            fi

            FEATURES=$(git log $RANGE --pretty=format:"%s|%h" | grep -E "^feat(\(.+\))?:" || true)
            if [ -n "$FEATURES" ]; then
              echo "### ✨ New Features"
              echo "$FEATURES" | while IFS='|' read -r msg hash; do
                clean=$(echo "$msg" | sed 's/^feat(\(.*\)):/[\1]/' | sed 's/^feat://')
                echo "- $clean (\`$hash\`)"
              done
              echo ""
            fi

            FIXES=$(git log $RANGE --pretty=format:"%s|%h" | grep -E "^fix(\(.+\))?:" || true)
            if [ -n "$FIXES" ]; then
              echo "### 🐛 Bug Fixes"
              echo "$FIXES" | while IFS='|' read -r msg hash; do
                clean=$(echo "$msg" | sed 's/^fix(\(.*\)):/[\1]/' | sed 's/^fix://')
                echo "- $clean (\`$hash\`)"
              done
              echo ""
            fi

            PERF=$(git log $RANGE --pretty=format:"%s|%h" | grep -E "^perf(\(.+\))?:" || true)
            if [ -n "$PERF" ]; then
              echo "### ⚡ Performance"
              echo "$PERF" | while IFS='|' read -r msg hash; do
                clean=$(echo "$msg" | sed 's/^perf(\(.*\)):/[\1]/' | sed 's/^perf://')
                echo "- $clean (\`$hash\`)"
              done
              echo ""
            fi

            DOCS=$(git log $RANGE --pretty=format:"%s|%h" | grep -E "^docs(\(.+\))?:" || true)
            if [ -n "$DOCS" ]; then
              echo "### 📖 Documentation"
              echo "$DOCS" | while IFS='|' read -r msg hash; do
                clean=$(echo "$msg" | sed 's/^docs(\(.*\)):/[\1]/' | sed 's/^docs://')
                echo "- $clean (\`$hash\`)"
              done
              echo ""
            fi

            CHORES=$(git log $RANGE --pretty=format:"%s|%h" | grep -E "^(chore|ci|build|refactor|style|test)(\(.+\))?:" || true)
            if [ -n "$CHORES" ]; then
              echo "<details>"
              echo "<summary>🔧 Maintenance</summary>"
              echo ""
              echo "$CHORES" | while IFS='|' read -r msg hash; do
                echo "- $msg (\`$hash\`)"
              done
              echo ""
              echo "</details>"
              echo ""
            fi

            if [ -n "$PREV_TAG" ]; then
              echo "---"
              echo "**Full changelog:** [\`${PREV_TAG}...${CURRENT_TAG}\`](https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${CURRENT_TAG})"
            fi

            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # ── Build frontend ────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build frontend
        run: |
          npm ci
          npm run build
        working-directory: frontend

      # ── Package release zip ───────────────────────────────────────────
      - name: Create release zip
        run: |
          zip -r docker_lens.zip custom_components/docker_lens \
            --exclude "*.pyc" \
            --exclude "*/__pycache__/*"

      # ── Create GitHub Release with notes + zip ────────────────────────
      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const notes = process.env.RELEASE_NOTES;

            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Docker Lens ${tag}`,
              body: notes,
              draft: false,
              prerelease: tag.includes('-'),
            });

            const fs = require('fs');
            const zipData = fs.readFileSync('docker_lens.zip');

            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
              name: 'docker_lens.zip',
              data: zipData,
            });

            console.log(`Release ${tag} created with asset.`);
        env:
          RELEASE_NOTES: ${{ steps.notes.outputs.NOTES }}
