name: Frontend Build

on:
  push:
  pull_request:

jobs:
  build:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Verify dist artefacts exist
        run: |
          test -f custom_components/docker_lens/frontend/dist/index.js
          test -f custom_components/docker_lens/frontend/dist/index.html
